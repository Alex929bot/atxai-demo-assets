<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2560" height="640" viewBox="0 0 2560 640">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#072a5c" />
      <stop offset="100%" stop-color="#0b3b72" />
    </linearGradient>
    <style>
      .logo { font-family: 'Inter', Arial, sans-serif; font-weight: 700; fill: #ffffff; }
      .headline { font-family: 'Inter', Arial, sans-serif; font-weight: 800; fill: #ffffff; }
      .sub { font-family: 'Inter', Arial, sans-serif; font-weight: 500; fill: #f5f5f5; }
      .accent { fill: #D35400; }
    </style>
  </defs>
  <rect width="2560" height="640" fill="url(#g)" />
  <!-- Left: Logo + Austin skyline -->
  <g transform="translate(80,80)">
    <text class="logo" x="0" y="40" font-size="36">ATX AI Solutions</text>
    <!-- simple skyline vector -->
    <g transform="translate(0,80)">
      <rect x="0" y="60" width="40" height="40" rx="4" fill="#0e4a7a" />
      <rect x="60" y="40" width="28" height="60" rx="3" fill="#124c86" />
      <rect x="100" y="20" width="18" height="80" rx="2" fill="#165594" />
      <rect x="130" y="50" width="36" height="50" rx="4" fill="#0e4a7a" />
    </g>
  </g>

  <!-- Center: Headline -->
  <g transform="translate(520,200)">
    <text class="headline" x="0" y="0" font-size="72">Stop losing calls. Start booking.</text>
    <text class="sub" x="0" y="70" font-size="28">12 Missed Calls Captured = $3,600 Potential Treatment Value Recovered</text>
  </g>

  <!-- Right: Day-4 Value Report card (thumbnail) -->
  <g transform="translate(1900,160)">
    <rect x="0" y="0" width="520" height="320" rx="12" fill="#ffffff" opacity="0.06" />
    <rect x="16" y="16" width="488" height="80" rx="8" fill="#0b3b72"/>
    <text x="32" y="62" font-family="Inter, Arial" font-size="22" fill="#ffffff">Day‑4 Value Report</text>
    <text x="32" y="120" font-family="Inter, Arial" font-size="28" fill="#ffffff">12 Missed Calls → <tspan class="accent">$3,600</tspan></text>
    <text x="32" y="160" font-family="Inter, Arial" font-size="16" fill="#e6e6e6">Bookings captured: 4</text>
    <rect x="32" y="200" width="220" height="44" rx="8" fill="#D35400"/>
    <text x="52" y="232" font-family="Inter, Arial" font-size="18" fill="#ffffff">View Full Report</text>
  </g>

  <!-- CTA bottom -->
  <g transform="translate(520,520)">
    <rect x="0" y="0" width="520" height="56" rx="8" fill="#D35400"/>
    <text x="20" y="36" font-family="Inter, Arial" font-size="20" fill="#ffffff">Text AUSTIN to (512) 555‑0123 — 15s demo</text>
  </g>
</svg>
